<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FactoringPractice</title>
  <meta name="description" content="FactoringPractice app support and information.">
  <style>
    :root {
      color-scheme: dark;
      --background: #000000;
      --text: #ffffff;
      --muted: #c9c9cf;
      --quiet: #8f949f;
      --line: rgba(255, 255, 255, 0.18);
      --panel: rgba(255, 255, 255, 0.07);
      --accent: #21c7bd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--background);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }

    main {
      width: min(760px, calc(100% - 48px));
      margin: 0 auto;
      padding: 58px 0 48px;
    }

    .app-icon {
      display: block;
      width: 122px;
      height: 122px;
      border-radius: 27px;
      box-shadow: 0 22px 54px rgba(33, 199, 189, 0.22);
    }

    h1 {
      max-width: 620px;
      margin: 40px 0 18px;
      font-size: clamp(3rem, 8vw, 5.3rem);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .tagline {
      margin: 0 0 42px;
      color: var(--muted);
      font-size: clamp(1.15rem, 3vw, 1.5rem);
    }

    .preview-wrap {
      display: flex;
      justify-content: center;
      margin: 0 auto 44px;
    }

    .phone {
      width: min(430px, 82vw);
      padding: 12px;
      background: #111318;
      border: 1px solid var(--line);
      border-radius: 44px;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.54);
    }

    .phone img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 32px;
    }

    .support {
      padding-top: 30px;
      border-top: 1px solid var(--line);
    }

    h2 {
      margin: 0 0 12px;
      font-size: 1.25rem;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 1rem;
    }

    a {
      color: var(--text);
      text-decoration-color: rgba(255, 255, 255, 0.42);
      text-underline-offset: 4px;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px 0 0;
    }

    .link-button {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 10px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font-weight: 700;
      text-decoration: none;
    }

    .link-button:hover {
      border-color: rgba(33, 199, 189, 0.7);
    }

    .email-image {
      display: inline-block;
      max-width: 100%;
      height: auto;
      margin: 2px 0 8px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    .email-pending {
      display: none;
      margin: 2px 0 8px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: var(--panel);
    }

    .fallback-note {
      color: var(--quiet);
      font-size: 0.94rem;
    }

    footer {
      margin-top: 36px;
      color: var(--quiet);
      font-size: 0.9rem;
    }

    @media (max-width: 560px) {
      main {
        width: min(100% - 34px, 760px);
        padding-top: 40px;
      }

      .app-icon {
        width: 96px;
        height: 96px;
        border-radius: 22px;
      }

      h1 {
        margin-top: 32px;
      }

      .phone {
        width: min(390px, 92vw);
        padding: 9px;
        border-radius: 35px;
      }

      .phone img {
        border-radius: 26px;
      }

      .links {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <main>
    <img class="app-icon" src="assets/app-icon.png" alt="FactoringPractice app icon" width="122" height="122">

    <h1>FactoringPractice</h1>
    <p class="tagline">A fast factoring puzzle game.</p>

    <div class="preview-wrap" aria-label="App preview">
      <div class="phone">
        <img src="assets/app-preview.png" alt="FactoringPractice App Store preview" width="946" height="2048">
      </div>
    </div>

    <section class="support" aria-labelledby="support-title">
      <h2 id="support-title">Support</h2>
      <p>
        For questions, bug reports, or support requests about FactoringPractice, please contact us at:
      </p>
      <p>
        <img
          class="email-image"
          src="assets/contact-email.png"
          alt="Contact email address"
          width="260"
          height="40"
          onerror="this.style.display='none'; this.parentElement.querySelector('.email-pending').style.display='inline-block';"
        >
        <span class="email-pending">Contact email image pending.</span>
      </p>
      <p class="fallback-note">
        To reduce spam, the email address is displayed as an image.
      </p>

      <div class="links" aria-label="Helpful links">
        <a class="link-button" href="privacy/">Privacy Policy</a>
      </div>
    </section>

    <footer>
      <span>FactoringPractice</span>
    </footer>
  </main>
</body>
</html>
